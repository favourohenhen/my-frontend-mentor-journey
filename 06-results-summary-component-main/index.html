<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="card-container">
<main class="card-main">
  <section class="card-result">
    <h1 class="card-main-result">Your Result</h1>
    <section class="card-result-circle">
      <p class="card-total-result">
        <span class="card-main-total">76</span> of 100</p>
    </section>
    <section class="card-text">
       <p class="big-text">Great</p>
      <p class="card-text-caption">
       You scored higher than 65% of the people who have taken these tests.
      </p>
  <section class="card-summary">
    <p class="summary-head">Summary</p>
    <!-- The summary contains -->
     <div class="card-scores">
      <div class="card1">
        <p class="score"><img src="" alt="" class="score-icon"></p>
     <p class="score"><span class="bold-score"></span></p>
      </div>
      <div class="card1">
        <p class="score"><img src="" alt="" class="score-icon">Reaction</p>
     <p class="score"><span class="bold-score">80</span>/ 100</p>
      </div>
      <div class="card1">
        <p class="score"><img src="" alt="" class="score-icon">Memory</p>
     <p class="score"><span class="bold-score">92</span>/ 100</p>
      </div>
      <div class="card1">
        <p class="score"><img src="" alt="" class="score-icon">Verbal</p>
     <p class="score"><span class="bold-score">61</span>/ 100</p>
      </div>
      <div class="card1">
        <p class="score"><img src="" alt="" class="score-icon">Visual</p>
     <p class="score"><span class="bold-score">72</span>/ 100</p>
      </div>
     
      <!-- the score container -->
     </div>
     <button type="button"> Continue</button>
  </section>
</main>
  
  
  

  
  
  

  
   

  
   

  
   

  
   

 
  
  
</body>
</html>
