<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="card_container">
    <main class="card_main">
      <!-- First card: Blue -->
      <section class="card_result">
        <h1 class="card_result_text">Your Result</h1>
        <section class="circle">
          <p class="circle_score">76</p>
          <p class="circle_total">of 100</p>
        </section>
        <section class="result_comment">
          <p class="big_text">Great</p>
          <p class="comment">
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </section>
      </section>

      <!-- Second Card: White -->
      <section class="summary_container">
        <h2 class="summary">Summary</h2>

        <section class="summary_card">
          
        
          <section class="reaction_card box">
            <div class="icon">
              <img src="./assets/images/icon-reaction.svg"width="1em" height="1em" class="reaction-icon" alt="img of reaction icon">
            <p class="reaction">Reaction</p>
            </div>
            
            <div class="score">
              <p class="bold">80</p>
              <p class="total">/ 100</p>
            </div>
            
          </section>
          <section class="memory_card box">
            <div class="icon">
              <img src="./assets/images/icon-memory.svg" width="1em" height="1em" class="memory-card" alt="img of memory icon">
            <p class="memory">Memory</p>
            </div>
            
            <div class="score">
              <p class="bold">92</p>
              <p class="total">/ 100</p>
            </div>
          </section>

          <section class="verbal_card box">
            <div class="icon">
              <img src="./assets/images/icon-verbal.svg"  width="1em" height="1em" class="verbal-icon" alt="img of verbal icon">
            <p class="verbal">Verbal</p>
            </div>
            
            <div class="score">
              <p class="bold">61</p>
              <p class="total">/ 100</p>
            </div>
          </section>

          <section class="visual_card box">
            <div class="icon">
              <img src="./assets/images/icon-visual.svg" width="1em" height="1em" class="visual-icon" alt="img of visual icon">
            <p class="visual">Visual</p>
            </div>
            
            <div class="score">
              <p class="bold">72</p>
              <p class="total">/ 100</p>
            </div>
          </section>
         
          <button type="button">Continue</button>
      
        </section>
        
      </section>
    </main>
  </body>
</html>
