<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="card-container">
    <main class="card-main">
      <!-- First card: Blue -->
      <section class="card-result">
        <h1 class="card-result-text">Your Result</h1>
        <section class="card-result-circle">
          <p class="card-main-total">76</p>
          <p class="card-total-result">of 100</p>
        </section>
        <section class="card-text">
          <p class="big-text">Great</p>
          <p class="card-text-caption">
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </section>
      </section>

      <!-- Second Card: White -->
      <section class="card-summary">
        <h2 class="summary-head">Summary</h2>

        <section class="card-scores">
          
          <div class="score">
            <h4 class="text-img"><img src="./assets/images/icon-reaction.svg" alt="">Reaction</h4>
            <p class="total-score"><span class="bold">80</span>/ 100</p>
          </div>
          <div class="score">
            <h4 class="text-img"><img src="" alt="">Memory</h4>
            <p class="total-score"><span class="bold">92</span>/ 100</p>
          </div>
          <div class="score">
            <h4 class="text-img"><img src="" alt="">Verbal</h4>
            <p class="total-score"><span class="bold">61</span>/ 100</p>
          </div>
          <div class="score">
            <h4 class="text-img"><img src="" alt="">Visual</h4>
            <p class="total-score"><span class="bold">72</span>/ 100</p>
          </div>
          
      
        </section>
        <button type="button">Continue</button>
      </section>
    </main>
  </body>
</html>
