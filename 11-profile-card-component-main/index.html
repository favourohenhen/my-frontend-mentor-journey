<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Profile card component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="body_card">
    <main class="main_card">
      <section class="card_img">
        <img
          src="./images/bg-pattern-card.svg"
          alt=""
          width="300px"
          class="card_img"
        />
        <img
          src="./images/image-victor.jpg"
          alt=""
          width="100px"
          class="profile_img"
        />
      </section>
    
        
        <section class="content_card">
          <section class="content_header">
            <h2 class="content_head">
              Victor Crest 
               <span class="content_head_num"> 26</span>
            </h2>
            <p class="head_place">London</p>
          </section>
          <section class="content_stats">
            <section class="stats">
              <p class="figures">80K</p>
              <p class="text">Followers</p>
            </section>
            <section class="stats">
              <p class="figures">803K</p>
              <p class="text">Likes</p>
            </section>
            <section class="stats">
              <p class="figures">1.4K</p>
              <p class="text">Photos</p>
            </section>
          </section>
          <!--CONTENT STATS END-->
        </section>
        <!--CONTENT END-->
      </div>
    </main>
  </body>
</html>
