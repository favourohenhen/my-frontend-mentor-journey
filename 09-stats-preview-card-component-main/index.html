<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Stats preview card component</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="site_body">
  <main class="main_site">
    <section class="image_card">
      <img src="./images/image-header-mobile.jpg" alt="image of women in an office working and chatting" width="500px">
    </section>
    <section class="content_card">
      <section class="content_head">
        <h1 class="head_text">Get <span class="color_purple">insights</span> that help your business grow.</h1>
        <p class="head_subinfo">Discover the benefits of data analytics and make better decisions regarding revenue, customer 
  experience, and overall efficiency.</p>
      </section>
      <section class="assets">
        <section class="company">
          <p class="figures">10k+</p>
          <p class="text">companies</p>
        </section>
        <section class="company">
          <p class="figures">314</p>
          <p class="text">templates</p>
        </section>
        <section class="company">
          <p class="figures">12m+</p>
          <p class="text">queries</p>
        </section>
      </section>
    </section><!--CONTENT CARD CONTAINER END-->
  </main>

  

  

   
   
   


</body>
</html>
