<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | NFT preview card component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="body_container">
    <main class="main_card">
      <img src="" alt="" class="main_img" />
      <section class="card_information">
        <h1 class="card_title">Equilibrium #3429</h1>
        <p class="card_subtitle">
          Our Equilibrium collection promotes balance and calm.
        </p>
        <section class="card_details">
          <p class="highlight">0.041 ETH</p>
          <section class="date_time">
            <img src="" alt="" class="time_icon" />
            <p class="date">3 days left</p>
          </section>
        </section>
        <!--card details section end-->
        <section class="avatar_bio">
          <img src="" alt="" class="avatar_img" />
          <p class="avatar">
            Creation of <span class="white">Jules Wyvern</span>
          </p>
        </section>
      </section>
      <!--card information section end-->
    </main>
  </body>
</html>
