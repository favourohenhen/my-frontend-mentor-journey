<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>
    <link rel="stylesheet" href="styles.css" />

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body class="site-container">
    <main class="site-main">
      <img
        src="./images/image-product-mobile.jpg"
        alt=""
        class="site-img"
        width="200px"
      />
      <section class="site-text">
        <span class="site-theme">Perfume</span>
        <h1 class="site-title">Gabrielle Essence Eau De Parfum</h1>
        <p class="site-subtitle">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <section class="prices">
          <span class="site-price">$149.99</span>
        <s class="strokethrough">$169.99</s>
        </section>
        
        <button class="site-cart">Add to Cart</button>
      </section>
    </main>
  </body>
</html>
