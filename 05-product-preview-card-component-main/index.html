<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="site-container">
    <main class="site-main">
      <picture class="site-card">
        <source
          media="(min-width: 768px)"
          srcset="./images/image-product-desktop.jpg"
        />
        <source
          media="(max-width: 768px)"
          srcset="./images/image-product-mobile.jpg"
        />
        <img
          src="./images/image-product-mobile.jpg"
          alt="an image of Gabrielle Essence Eau De Parfum "
        />
      </picture>

      <section class="site-text">
        <span class="site-theme">Perfume</span>
        <h1 class="site-title">Gabrielle Essence Eau De Parfum</h1>
        <p class="site-subtitle">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <section class="prices">
          <span class="site-price">$149.99</span>
          <s class="strokethrough">$169.99</s>
        </section>

        <button class="site-cart" type="button">
          <span class="carticon"><img src="./images/icon-cart.svg" /></span>Add
          to Cart
        </button>
      </section>
    </main>
  </body>
</html>
