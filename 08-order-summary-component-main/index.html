<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Order summary card</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="main_body">
    <main class="main_container">
      <img src="./images/illustration-hero.svg" width="350px" class="main_img" />
      <section class="main_content">
        <section class="order_head">
          <h1 class="order_title">Order Summary</h1>
          <p class="order_subtitle">
            You can now listen to millions of songs, audiobooks, and podcasts on
            any device anywhere you like!
          </p>
        </section>
        <!--End of Order information-->
        <section class="content_plan">
          <img src="./images/icon-music.svg" alt="" />
          <section class="plan_text">
            <p class="annual_plan">Annual Plan</p>
            <p class="year">$59.99/year</p>
          </section>
          <section class="plan_link">
            <a href="">Change</a>
          </section>
        </section>
        <!--End of Content Plan-->
        <section class="buttons">
          <button type="button" class="proceed_button">
            Proceed to Payment
          </button>
          <button type="button" class="cancel_button">Cancel Order</button>
        </section>
      </section>
      <!--End of main content-->
    </main>
  </body>
</html>
