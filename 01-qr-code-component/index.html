<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<main class="container">
  <div class="img-container">
    <img src="./images/image-qr-code.png" alt="An image of a qr-code">
  </div>
  <div class="content-container">
    <h1 class="content-header">Improve your front-end skills by building projects</h1>
    <p class="content-detail">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
</main>
  

  
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">DevFavour</a>.
  </footer>
</body>
</html>
